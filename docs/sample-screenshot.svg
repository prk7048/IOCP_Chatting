<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <style>
      .title { font: 700 26px 'Consolas', monospace; fill: #e5e7eb; }
      .label { font: 700 20px 'Consolas', monospace; fill: #93c5fd; }
      .text { font: 18px 'Consolas', monospace; fill: #d1d5db; }
      .muted { font: 16px 'Consolas', monospace; fill: #9ca3af; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <text x="40" y="50" class="title">Windows IOCP Chat Server - Sample Console Screenshot</text>
  <rect x="40" y="90" width="370" height="580" rx="16" fill="#111827" stroke="#334155" />
  <rect x="455" y="90" width="370" height="580" rx="16" fill="#111827" stroke="#334155" />
  <rect x="870" y="90" width="370" height="580" rx="16" fill="#111827" stroke="#334155" />
  <text x="60" y="125" class="label">Server</text>
  <text x="60" y="160" class="text">[2026-03-17 19:10:01] server started on port 7777</text>
  <text x="60" y="195" class="text">[2026-03-17 19:10:04] session#1 connected as Guest1</text>
  <text x="60" y="230" class="text">[2026-03-17 19:10:06] session#1 nickname =&gt; Alice</text>
  <text x="60" y="265" class="text">[2026-03-17 19:10:08] room created: Lobby by Alice</text>
  <text x="60" y="300" class="text">[2026-03-17 19:10:08] session#1 joined room Lobby</text>
  <text x="60" y="335" class="text">[2026-03-17 19:10:12] session#2 connected as Guest2</text>
  <text x="60" y="370" class="text">[2026-03-17 19:10:14] session#2 nickname =&gt; Bob</text>
  <text x="60" y="405" class="text">[2026-03-17 19:10:16] session#2 joined room Lobby</text>
  <text x="60" y="440" class="text">[2026-03-17 19:10:18] [Lobby] Alice: hello from alice</text>
  <text x="60" y="475" class="text">[2026-03-17 19:10:21] [Lobby] Bob: hello from bob</text>
  <text x="60" y="510" class="text">[2026-03-17 19:10:24] session#2 left room Lobby</text>
  <text x="60" y="545" class="text">[2026-03-17 19:10:28] session#2 closed (127.0.0.1:51002): peer disconnected</text>
  <text x="60" y="580" class="text">[2026-03-17 19:10:31] session#1 closed (127.0.0.1:51001): peer disconnected</text>
  <text x="475" y="125" class="label">Client A</text>
  <text x="475" y="160" class="text">Connected to 127.0.0.1:7777</text>
  <text x="475" y="195" class="text">/nick Alice</text>
  <text x="475" y="230" class="text">S2C_LoginAck: Alice</text>
  <text x="475" y="265" class="text">/create Lobby</text>
  <text x="475" y="300" class="text">S2C_RoomJoined: Lobby</text>
  <text x="475" y="335" class="text">S2C_SystemMessage: Alice entered the room.</text>
  <text x="475" y="370" class="text">S2C_SystemMessage: Bob entered the room.</text>
  <text x="475" y="405" class="text">hello from alice</text>
  <text x="475" y="440" class="text">[Alice] hello from alice</text>
  <text x="475" y="475" class="text">[Bob] hello from bob</text>
  <text x="890" y="125" class="label">Client B</text>
  <text x="890" y="160" class="text">Connected to 127.0.0.1:7777</text>
  <text x="890" y="195" class="text">/nick Bob</text>
  <text x="890" y="230" class="text">S2C_LoginAck: Bob</text>
  <text x="890" y="265" class="text">/join Lobby</text>
  <text x="890" y="300" class="text">S2C_RoomJoined: Lobby</text>
  <text x="890" y="335" class="text">S2C_SystemMessage: Bob entered the room.</text>
  <text x="890" y="370" class="text">[Alice] hello from alice</text>
  <text x="890" y="405" class="text">hello from bob</text>
  <text x="890" y="440" class="text">[Bob] hello from bob</text>
  <text x="890" y="475" class="text">/leave</text>
  <text x="890" y="510" class="text">S2C_RoomLeft: Lobby</text>
  <text x="890" y="545" class="text">Disconnected from server.</text>
  <text x="40" y="700" class="muted">이 파일은 README에서 요구하는 테스트 스크린샷 예시용 산출물입니다.</text>
</svg>
